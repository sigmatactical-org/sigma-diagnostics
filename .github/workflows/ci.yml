name: diagnostics CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ui/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'ui/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.90.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test --lib --tests

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
          components: rustfmt

      - run: cargo fmt --all -- --check

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo build --release
