name: sigma-diagnostics CI

on:
  push:
    branches: [main]
    paths:
      - 'can-viewer/**'
      - 'sigma-diagnostics/**'
      - 'sigma-racer-mechanic/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'can-viewer/**'
      - 'sigma-diagnostics/**'
      - 'sigma-racer-mechanic/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.90.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test --workspace

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo test --workspace --lib --tests

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedded/sigma-diagnostics

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
          components: rustfmt

      - run: cargo fmt --all -- --check

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedded/sigma-diagnostics
    steps:
      - uses: actions/checkout@v4
        with:
          path: embedded/sigma-diagnostics

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-telemetry
          path: embedded/sigma-racer-telemetry

      - uses: actions/checkout@v4
        with:
          repository: sigmatactical-org/sigma-racer-sidearm
          path: embedded/sigma-racer-sidearm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: embedded/sigma-diagnostics

      - name: Install Slint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev

      - run: cargo build -p can-viewer -p sigma-racer-mechanic --release
